<!doctype html>
<html lang="en">
  <head>
    <script type="module" src="/@vite/client"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>3x Resolution Test</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #fps {
        position: fixed;
        top: 8px;
        right: 8px;
        padding: 4px 8px;
        font: 12px/1 monospace;
        font-variant-numeric: tabular-nums;
        color: #0f0;
        z-index: 10;
      }

      #box {
        position: absolute;
        left: 0;
        top: 0;
        width: 120px;
        height: 120px;
        background: #667eea;
        cursor: grab;
        z-index: 5;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="fps">--</div>

    <div id="box"></div>

    <script>
      ;(function () {
        const box = document.getElementById('box')
        let boxX = (window.innerWidth - 120) / 2
        let boxY = (window.innerHeight - 120) / 2
        let offsetX = 0,
          offsetY = 0
        let dragging = false

        box.style.transform = `translate3d(${boxX}px, ${boxY}px, 0)`

        box.addEventListener(
          'touchstart',
          (e) => {
            e.preventDefault()
            const t = e.touches[0]
            offsetX = t.clientX - boxX
            offsetY = t.clientY - boxY
            dragging = true
          },
          { passive: false },
        )

        box.addEventListener('mousedown', (e) => {
          offsetX = e.clientX - boxX
          offsetY = e.clientY - boxY
          dragging = true
        })

        document.addEventListener(
          'touchmove',
          (e) => {
            if (!dragging) return
            e.preventDefault()
            const t = e.touches[0]
            boxX = t.clientX - offsetX
            boxY = t.clientY - offsetY
            box.style.transform = `translate3d(${boxX}px, ${boxY}px, 0)`
          },
          { passive: false },
        )

        document.addEventListener('mousemove', (e) => {
          if (!dragging) return
          boxX = e.clientX - offsetX
          boxY = e.clientY - offsetY
          box.style.transform = `translate3d(${boxX}px, ${boxY}px, 0)`
        })

        document.addEventListener('touchend', () => {
          dragging = false
        })
        document.addEventListener('touchcancel', () => {
          dragging = false
        })
        document.addEventListener('mouseup', () => {
          dragging = false
        })
      })()
    </script>
  </body>
</html>
